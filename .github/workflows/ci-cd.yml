name: Polyglot App CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 2. Setup .NET SDK to test the backend
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # 3. Restore and Build .NET Backend
    - name: Restore and Build Backend
      run: |
        dotnet restore ./backend-dotnet
        dotnet build ./backend-dotnet --configuration Release

    # 4. Setup Python Environment to test the worker
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 5. Install Python dependencies and check syntax
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f ./worker-python/requirements.txt ]; then pip install -r ./worker-python/requirements.txt; fi

    # 6. Verify Docker files can build successfully
    - name: Validate Docker Builds
      run: |
        docker build -t test-backend:latest ./backend-dotnet
        docker build -t test-worker:latest ./worker-python